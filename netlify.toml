# Netlify Configuration for Quran Tracker

[build]
  # Build command
  command = "npm run build"

  # Output directory (where Vite outputs the build)
  publish = "dist"

  # Environment variables for build (add your Twilio credentials in Netlify UI)
  # VITE_TWILIO_ACCOUNT_SID
  # VITE_TWILIO_AUTH_TOKEN
  # VITE_TWILIO_WHATSAPP_NUMBER

# SPA fallback - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
